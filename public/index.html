<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zrovyn Finance Dashboard</title>
    <meta name="description" content="Finance Data Processing and Access Control Dashboard">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <div id="app">
        <!-- Auth View -->
        <div id="auth-view" class="view active">
            <div class="glass-card auth-card">
                <div class="logo">
                    <div class="logo-icon"></div>
                    <h1>Zrovyn Finance</h1>
                </div>
                <h2 id="auth-title">Welcome Back</h2>
                <form id="auth-form">
                    <div class="input-group" id="name-group" style="display: none;">
                        <label for="name">Full Name</label>
                        <input type="text" id="name" placeholder="Enter your full name">
                    </div>
                    <div class="input-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" required placeholder="Enter your email">
                    </div>
                    <div class="input-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" required placeholder="Enter your password">
                    </div>
                    <div class="error-message" id="auth-error"></div>
                    <button type="submit" class="btn primary-btn w-full" id="auth-submit">Sign In</button>
                    <p class="auth-switch">Don't have an account? <span id="toggle-auth">Register here</span></p>
                </form>
            </div>
        </div>

        <!-- Dashboard View -->
        <div id="dashboard-view" class="view">
            <nav class="sidebar">
                <div class="logo">
                    <div class="logo-icon small"></div>
                    <h2>Zrovyn</h2>
                </div>
                <ul class="nav-links">
                    <li class="active"><a href="#" id="nav-dashboard">Dashboard</a></li>
                    <li><a href="#" id="nav-records">Records</a></li>
                </ul>
                <div class="user-info">
                    <div class="avatar" id="user-avatar">User</div>
                    <div class="details">
                        <p id="user-name">User Name</p>
                        <span id="user-role" class="badge">Role</span>
                    </div>
                    <button class="btn icon-btn" id="logout-btn" title="Logout">🚪</button>
                </div>
            </nav>

            <main class="main-content">
                <header>
                    <h1 id="page-title">Dashboard Overview</h1>
                    <button class="btn primary-btn" id="add-record-btn" style="display: none;">+ Add Record</button>
                </header>

                <div id="dashboard-content" class="content-section active">
                    <div class="summary-cards">
                        <div class="glass-card stat-card">
                            <h3 class="gradient-text">Total Income</h3>
                            <p class="amount positive" id="stat-income">$0.00</p>
                        </div>
                        <div class="glass-card stat-card">
                            <h3 class="gradient-text">Total Expenses</h3>
                            <p class="amount negative" id="stat-expense">$0.00</p>
                        </div>
                        <div class="glass-card stat-card">
                            <h3 class="gradient-text">Net Balance</h3>
                            <p class="amount" id="stat-balance">$0.00</p>
                        </div>
                    </div>

                    <div class="charts-section">
                        <div class="glass-card chart-container">
                            <h3>Category Breakdown</h3>
                            <div id="category-breakdown" class="breakdown-list"></div>
                        </div>
                        <div class="glass-card chart-container">
                            <h3>Recent Activity</h3>
                            <div id="recent-activity" class="activity-list"></div>
                        </div>
                    </div>
                </div>

                <div id="records-content" class="content-section">
                    <div class="glass-card table-container">
                        <table class="data-table">
                            <thead>
                                <tr>
                                    <th>Date</th>
                                    <th>Type</th>
                                    <th>Category</th>
                                    <th>Amount</th>
                                    <th>Notes</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody id="records-tbody">
                                <!-- Records go here -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <!-- Modal for Adding/Editing Records -->
    <div id="record-modal" class="modal">
        <div class="modal-content glass-card">
            <span class="close-btn" id="close-modal">&times;</span>
            <h2 id="modal-title">Add Record</h2>
            <form id="record-form">
                <input type="hidden" id="record-id">
                <div class="input-group">
                    <label for="record-type">Type</label>
                    <select id="record-type" required>
                        <option value="income">Income</option>
                        <option value="expense">Expense</option>
                    </select>
                </div>
                <div class="input-group">
                    <label for="record-amount">Amount</label>
                    <input type="number" step="0.01" id="record-amount" required placeholder="0.00">
                </div>
                <div class="input-group">
                    <label for="record-category">Category</label>
                    <input type="text" id="record-category" required placeholder="e.g. Salary, Rent">
                </div>
                <div class="input-group">
                    <label for="record-notes">Notes</label>
                    <input type="text" id="record-notes" placeholder="Optional notes">
                </div>
                <div class="error-message" id="record-error"></div>
                <button type="submit" class="btn primary-btn w-full">Save Record</button>
            </form>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
